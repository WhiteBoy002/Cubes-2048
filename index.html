<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubes 2048</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="overlay">
        
        <div class="side-panel left-panel">
            <h2>CONTROLS</h2>
            <div class="instruction-item">
                <span class="icon"></span>
                <div class="text"><b>MOUSE</b><br>Move Cube</div>
            </div>
            <div class="instruction-item">
                <span class="icon"></span>
                <div class="text"><b>SPACE</b><br>Sprint Fast</div>
            </div>
        </div>

        <div class="menu-content">
            <div id="death-text" style="display:none; color:#f65e3b; font-size:40px; margin-bottom:10px;">GAME OVER</div>
            <h1 style="color: #888; margin: 0; font-size: 24px;">BEST SCORE</h1>
            <div class="high-score-display" id="bestScore">0</div>
            <input type="text" id="nickname" placeholder="YOUR NAME" maxlength="10" autocomplete="off">
            <br><br>
            <button type="button" onclick="startGame()">PLAY</button>
        </div>

        <div class="side-panel right-panel">
            <h2>PRO TIPS</h2>
            <p><b>EAT SMALLS</b><br>Merge lower numbers to grow.</p>
            <p><b>HUNT 2X</b><br>Double your entire size instantly!</p>
            <p><b>TRAP BOTS</b><br>Circle them to force a collision.</p>
        </div>
    </div>

    <div id="leaderboard">
        <h3 style="margin:0 0 10px 0; border-bottom: 1px solid #555; text-align: center;">TOP 10</h3>
        <div id="lb-list"></div>
    </div>

    <div id="music-container">
    <span id="music-toggle-text">🔊 MUSIC: ON</span>
    <div class="volume-wrapper">
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.4">
    </div>
</div>

    <div id="boost-container">
        <div id="boost-bar"></div>
        <div id="boost-text">HOLD SPACE TO SPRINT</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <script src="script.js"></script>
</body>
</html>
